{"a": "Talk Talk", "t": "Spirit of Eden", "y": 1988, "g": "Post Rock", "d": "Former synth-pop hitmakers who deliberately destroyed their commercial career to make art. Mark Hollis and Tim Friese-Greene assembled dozens of musicians \u2014 string players, oboist, organist \u2014 but used only fragments of their improvisations, editing them into something wholly new. EMI sued them for making an uncommercial album. It essentially invented post-rock a decade before the term existed. A cathedral of sound built from silence, patience, and uncompromising vision.", "tr": ["The Rainbow", "Eden", "Desire", "Inheritance", "I Believe in You", "Wealth"], "s": [0, 1, 4]},

{"a": "The Caretaker", "t": "An Empty Bliss Beyond This World", "y": 2011, "g": "Ambient", "d": "Leyland Kirby sourced 1920s and 1930s ballroom recordings, then degraded them \u2014 adding crackle, echo, and decay until the music sounds like it's being remembered by a mind losing its grip. A metaphor for dementia made literal through sound. 'All You Are Going to Want to Do Is Get Back There' is simultaneously comforting and terrifying. Later became a viral phenomenon. Kirby subsequently created a six-album series tracking the stages of memory loss. Hauntingly beautiful.", "tr": ["All You Are Going to Want to Do Is Get Back There", "Libet's Delay", "Mental Caverns Without Sunshine", "Moments of Sufficient Lucidity", "The Great Hidden Sea of the Unconscious"], "s": [0, 1, 4]},
{"a": "Alice Coltrane", "t": "Journey in Satchidananda", "y": 1971, "g": "Spiritual Jazz", "d": "John Coltrane's widow and a profound musician in her own right. Harp, tamboura, bass, and Pharoah Sanders's searing saxophone create genuinely transcendent spiritual jazz. Recorded after she adopted the Sanskrit name Turiyasangitananda, the album channels her devotion into music that feels like meditation given form. Largely overlooked for decades, it's now recognized as one of the great spiritual recordings in any genre.", "tr": ["Journey in Satchidananda", "Shiva-Loka", "Stopover Bombay", "Something About John Coltrane", "Isis and Osiris"], "s": [0, 2, 4]},

{"a": "Slint", "t": "Spiderland", "y": 1991, "g": "Post Rock", "d": "Six songs recorded in four days at River North Studios in Louisville, Kentucky. Whispered vocals erupting into anguished screams over Steve Albini-influenced guitar interplay that alternates between mathematical precision and emotional chaos. 'Good Morning, Captain' builds to one of the most cathartic moments in rock. The band broke up before release. Several members sought psychiatric help afterward. Essentially invented both post-rock and math rock. A genuinely harrowing listen.", "tr": ["Breadcrumb Trail", "Nosferatu Man", "Don Aman", "Washer", "For Dinner...", "Good Morning Captain"], "s": [0, 3, 5]},
{"a": "Os Mutantes", "t": "Os Mutantes", "y": 1968, "g": "Psychedelic Rock", "d": "Brazilian tropic\u00e1lia at its most joyful and anarchic. The S\u00e3o Paulo trio built homemade effects pedals and fused bossa nova, psychedelia, and Hendrix-style guitar into songs of subversive beauty \u2014 all under military dictatorship. 'Bat Macumba' reduces its own title to a single syllable through repetition. Kurt Cobain was a devoted fan. David Byrne's Luaka Bop label reissued it, introducing them to the world outside Brazil.", "tr": ["Panis et Circenses", "A Minha Menina", "O Relojo", "Adeus Maria Fulo", "Baby", "Senhor F", "Bat Macumba", "Le Premier Bonheur du Jour", "Trem Fantasma", "Tempo No Tempo"], "s": [0, 4, 6, 8]},
{"a": "Scott Walker", "t": "Scott 4", "y": 1969, "g": "Art Pop", "d": "The journey from teen idol to existentialist art-song composer is one of pop's strangest trajectories. Lush orchestral arrangements frame lyrics about Ingmar Bergman films, Soviet uprisings, and Camus-influenced philosophy. 'The Old Man's Back Again' was inspired by the Soviet invasion of Czechoslovakia. Commercial suicide at the time, it's now recognized as visionary \u2014 Walker spent his later career making music so experimental it made this sound like easy listening.", "tr": ["The Seventh Seal", "On Your Own Again", "The World's Strongest Man", "Angels of Ashes", "Boy Child", "Hero of the War", "Duchess", "Get Behind Me", "The Old Man's Back Again", "Rhymes of Goodbye"], "s": [0, 1, 4, 8]},
{"a": "Townes Van Zandt", "t": "Live at the Old Quarter", "y": 1977, "g": "Folk", "d": "Recorded at a small Houston club in 1973, released in 1977. Just his voice and acoustic guitar in front of an intimate audience. Songs of devastating beauty and philosophical despair \u2014 'Pancho and Lefty,' later a number-one country hit for Willie Nelson and Merle Haggard, is rendered here in its purest form. 'To Live Is to Fly' is Van Zandt's masterpiece. He died on New Year's Day 1999 at 52. Among the greatest live folk recordings ever made.", "tr": ["Pancho and Lefty", "Mr. Mudd & Mr. Gold", "Don't You Take It Too Bad", "Two Girls", "Kathleen", "If I Needed You", "Brand New Companion", "White Freightliner Blues", "To Live Is to Fly", "Rex's Blues", "Tecumseh Valley"], "s": [0, 4, 5, 10]},

{"a": "William Basinski", "t": "The Disintegration Loops", "y": 2002, "g": "Ambient", "d": "Basinski was digitizing old tape loops when he noticed the magnetic oxide was literally crumbling off the tape as it played \u2014 the music was destroying itself in real time. He recorded the decay. The process happened to conclude on September 11, 2001, and Basinski filmed the Twin Towers burning from his Brooklyn rooftop as the loops disintegrated. Music as entropy, beauty as loss, time as destruction. One of the most conceptually and emotionally powerful works of the twenty-first century.", "tr": ["dlp 1.1", "dlp 2.1", "dlp 3", "dlp 4", "dlp 5", "dlp 6"], "s": [0, 1]},

{"a": "Talk Talk", "t": "Spirit of Eden", "y": 1988, "g": "Post Rock", "d": "Former synth-pop hitmakers who deliberately destroyed their commercial career to make art. Mark Hollis and Tim Friese-Greene assembled dozens of musicians \u2014 string players, oboist, organist \u2014 but used only fragments of their improvisations, editing them into something wholly new. EMI sued them for making an uncommercial album. It essentially invented post-rock a decade before the term existed. A cathedral of sound built from silence, patience, and uncompromising vision.", "tr": ["The Rainbow", "Eden", "Desire", "Inheritance", "I Believe in You", "Wealth"], "s": [0, 1, 4]},
{"a": "Can", "t": "Tago Mago", "y": 1971, "g": "Krautrock", "d": "Japanese busker Damo Suzuki was recruited off the street in Munich to replace Malcolm Mooney. The Cologne-based band recorded hallucinatory jams on two-track tape, then edited them into structured pieces. 'Mushroom' is pure trance music years before the genre existed. 'Halleluwah' grooves for 18 hypnotic minutes. 'Aumgn' is 17 minutes of pure void. Equal parts hypnotic and terrifying \u2014 krautrock's most adventurous and influential album.", "tr": ["Paperhouse", "Mushroom", "Oh Yeah", "Halleluwah", "Aumgn", "Peking O", "Bring Me Coffee or Tea"], "s": [0, 1, 3]},
{"a": "Slint", "t": "Spiderland", "y": 1991, "g": "Post Rock", "d": "Six songs recorded in four days at River North Studios in Louisville, Kentucky. Whispered vocals erupting into anguished screams over Steve Albini-influenced guitar interplay that alternates between mathematical precision and emotional chaos. 'Good Morning, Captain' builds to one of the most cathartic moments in rock. The band broke up before release. Several members sought psychiatric help afterward. Essentially invented both post-rock and math rock. A genuinely harrowing listen.", "tr": ["Breadcrumb Trail", "Nosferatu Man", "Don Aman", "Washer", "For Dinner", "Good Morning Captain"], "s": [0, 3, 5]},
{"a": "Os Mutantes", "t": "Os Mutantes", "y": 1968, "g": "Psychedelic Rock", "d": "Brazilian tropic\u00e1lia at its most joyful and anarchic. The S\u00e3o Paulo trio built homemade effects pedals and fused bossa nova, psychedelia, and Hendrix-style guitar into songs of subversive beauty \u2014 all under military dictatorship. 'Bat Macumba' reduces its own title to a single syllable through repetition. Kurt Cobain was a devoted fan. David Byrne's Luaka Bop label reissued it, introducing them to the world outside Brazil.", "tr": ["Panis et Circenses", "A Minha Menina", "O Relojo", "Baby", "Bat Macumba", "Trem Fantasma"], "s": [0, 3, 4]},
{"a": "Scott Walker", "t": "Scott 4", "y": 1969, "g": "Art Pop", "d": "The journey from teen idol to existentialist art-song composer is one of pop's strangest trajectories. Lush orchestral arrangements frame lyrics about Ingmar Bergman films, Soviet uprisings, and Camus-influenced philosophy. 'The Old Man's Back Again' was inspired by the Soviet invasion of Czechoslovakia. Commercial suicide at the time, it's now recognized as visionary \u2014 Walker spent his later career making music so experimental it made this sound like easy listening.", "tr": ["The Seventh Seal", "On Your Own Again", "The World's Strongest Man", "Boy Child", "Hero of the War", "The Old Man's Back Again"], "s": [0, 1, 3]},
{"a": "Boards of Canada", "t": "Music Has the Right to Children", "y": 1998, "g": "Electronic", "d": "Scottish brothers Marcus Eoin and Michael Sandison. Warped synthesizers, decayed samples from 1970s educational films, and field recordings layered into music that evokes nostalgia for memories that aren't yours \u2014 childhood filtered through damaged videotape. 'Roygbiv' and 'Turquoise Hexagon Sun' are heartbreakingly beautiful. A Warp Records landmark that defined an entire aesthetic of hauntological electronic music.", "tr": ["Wildlife Analysis", "An Eagle in Your Mind", "Telephasic Workshop", "Sixtyten", "Turquoise Hexagon Sun", "Roygbiv", "Aquarius", "Olson", "Happy Cycling"], "s": [2, 5, 6]},
{"a": "Joanna Newsom", "t": "Ys", "y": 2006, "g": "Folk", "d": "Five songs spanning 55 minutes. Newsom's harp playing and extraordinary, divisive voice \u2014 a childlike soprano that some find transcendent and others find unlistenable \u2014 over Van Dyke Parks's lush orchestrations. Lyrics are dense as a Victorian novel, with 'Emily' alone running 12 minutes. Wholly unique in modern music \u2014 there is no other artist who sounds remotely like her, and no album that attempts what Ys achieves.", "tr": ["Emily", "Monkey & Bear", "Sawdust & Diamonds", "Only Skin", "Cosmia"], "s": [0, 2, 3]},
{"a": "Townes Van Zandt", "t": "Live at the Old Quarter", "y": 1977, "g": "Folk", "d": "Recorded at a small Houston club in 1973, released in 1977. Just his voice and acoustic guitar in front of an intimate audience. Songs of devastating beauty and philosophical despair \u2014 'Pancho and Lefty,' later a number-one country hit for Willie Nelson and Merle Haggard, is rendered here in its purest form. 'To Live Is to Fly' is Van Zandt's masterpiece. He died on New Year's Day 1999 at 52. Among the greatest live folk recordings ever made.", "tr": ["Pancho and Lefty", "Mr. Mudd and Mr. Gold", "Two Girls", "Kathleen", "If I Needed You", "White Freightliner Blues", "To Live Is to Fly", "Tecumseh Valley"], "s": [0, 4, 6, 7]},
{"a": "Alice Coltrane", "t": "Journey in Satchidananda", "y": 1971, "g": "Spiritual Jazz", "d": "John Coltrane's widow and a profound musician in her own right. Harp, tamboura, bass, and Pharoah Sanders's searing saxophone create genuinely transcendent spiritual jazz. Recorded after she adopted the Sanskrit name Turiyasangitananda, the album channels her devotion into music that feels like meditation given form. Largely overlooked for decades, it's now recognized as one of the great spiritual recordings in any genre.", "tr": ["Journey in Satchidananda", "Shiva-Loka", "Stopover Bombay", "Something About John Coltrane", "Isis and Osiris"], "s": [0, 2]},

{"a": "Low", "t": "I Could Live in Hope", "y": 1994, "g": "Slowcore", "d": "Duluth, Minnesota trio who practically invented slowcore. Painfully slow tempos \u2014 drums reduced to single hits separated by seconds of silence. Alan Sparhawk and Mimi Parker's harmonies achieved a nearly supernatural blend \u2014 they were married, and their voices had merged over years of singing together. Parker died of ovarian cancer in 2022. This debut established the template: minimalism as emotional maximalism.", "tr": ["Words", "Fear", "Cut", "Slide", "Lazy", "Lullaby", "Sea", "Over the Ocean", "Rope", "Sunshine"], "s": [0, 2, 6]},

function haptic(style){
  try{
    if(navigator.vibrate){
      if(style==="light")navigator.vibrate(30);
      else if(style==="medium")navigator.vibrate(50);
      else if(style==="heavy")navigator.vibrate([30,40,30]);
      else if(style==="success")navigator.vibrate([25,50,35]);
      else navigator.vibrate(30);
    }
  }catch(e){}
}

              h("span",{style:{fontSize:11,color:"#666",fontFamily:"'DM Mono',monospace"}},item.artist),
              h("span",{style:{fontSize:8,color:col2,fontFamily:"'DM Mono',monospace",background:col2+"12",padding:"1px 5px",borderRadius:6}},item.genre)
            )
          ),
          h("span",{style:{fontSize:9,color:"#333",fontFamily:"'DM Mono',monospace",flexShrink:0}},dt),
          h("button",{onClick:function(){haptic("light");onRemove(item.key)},style:{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:14,padding:"4px 6px"}},"\u00d7")
        );
      })
    )
  );
}

// ═══════ MAIN APP ═══════
function App(){
  const[view,setView]=uS("today"),[exC,setExC]=uS(false),[exO,setExO]=uS(false);
  const[ratings,setRatings]=uS(loadR);
  const[ratingModal,setRM]=uS(null);

  const today=getDay(0),history=Array.from({length:7},function(_,i){return getDay(i)});
  const accent=gc(today.classic.g);

  function submitRating(album,type,data){setRatings(function(p){const n={...p};n[aKey(album)]={ts:Date.now(),...data};saveR(n);return n})}
  function removeRating(key){setRatings(function(p){const n={...p};delete n[key];saveR(n);return n})}
  const rc=Object.keys(ratings).length;

  return h("div",{style:{minHeight:"100vh",background:"#050505",color:"#e8e4df",position:"relative",overflow:"hidden"}},
    h("div",{style:{position:"fixed",top:"-40%",right:"-25%",width:"80vw",height:"80vw",borderRadius:"50%",background:"radial-gradient(circle,"+accent+"0a 0%,transparent 60%)",pointerEvents:"none",transition:"background 2s"}}),
    h("div",{style:{position:"fixed",bottom:"-30%",left:"-15%",width:"60vw",height:"60vw",borderRadius:"50%",background:"radial-gradient(circle,"+gc(today.obscure.g)+"08 0%,transparent 55%)",pointerEvents:"none"}}),
    h("div",{style:{position:"fixed",inset:0,pointerEvents:"none",zIndex:100,opacity:0.02,backgroundImage:"url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E\")"}}),

    ratingModal&&h(RatingModal,{album:ratingModal.album,type:ratingModal.type,onClose:function(){setRM(null)},onSubmit:function(data){submitRating(ratingModal.album,ratingModal.type,data)}}),

    h("div",{style:{maxWidth:580,margin:"0 auto",padding:"28px 18px 120px",position:"relative",zIndex:1}},
      h(Header,{ratingCount:rc,onCollectionClick:function(){setView("collection")}}),

      // ═══════ NAV TABS - PILL STYLE ═══════
      h("nav",{className:"fade-up",style:{display:"flex",gap:6,marginBottom:26,animationDelay:"0.06s"}},
        [{id:"today",lb:"Today",icon:"\u25CF"},{id:"history",lb:"This Week",icon:"\u25CB"},{id:"collection",lb:"Collection",icon:"\u2605"}].map(function(t){
          const active=view===t.id;
          return h("button",{key:t.id,onClick:function(){haptic("light");setView(t.id)},style:{
            flex:1,
            background:active?"#fff":"#161616",
            border:active?"none":"1px solid #222",
            padding:"12px 14px",
            borderRadius:50,
            fontSize:12,
            fontFamily:"'DM Mono',monospace",
            fontWeight:active?600:400,
            letterSpacing:"0.04em",
            color:active?"#050505":"#999",
            cursor:"pointer",
            transition:"all .25s cubic-bezier(.16,1,.3,1)",
            textTransform:"uppercase",
          }},t.lb);
        })
      ),

      view==="today"&&h("div",{style:{display:"flex",flexDirection:"column",gap:20}},
        h(Card,{album:today.classic,type:"classic",expanded:exC,onToggle:function(){setExC(!exC)},ratingData:ratings[aKey(today.classic)],onRate:function(){setRM({album:today.classic,type:"classic"})},delay:0.12}),
        h(Card,{album:today.obscure,type:"obscure",expanded:exO,onToggle:function(){setExO(!exO)},ratingData:ratings[aKey(today.obscure)],onRate:function(){setRM({album:today.obscure,type:"obscure"})},delay:0.26})
      ),

      view==="history"&&h("div",{style:{display:"flex",flexDirection:"column",gap:4}},history.map(function(d,i){return h(MiniRow,{key:i,day:d,i:i,ratings:ratings,onRate:function(album,type){setRM({album:album,type:type})}})})),

      view==="collection"&&h(CollectionPage,{ratings:ratings,onRemove:removeRating})
    )
  );
}

// ═══════ NOTIFICATIONS ═══════
function scheduleDaily(){
  setInterval(function(){
    var now=new Date(),h2=now.getHours(),m=now.getMinutes(),today=now.toDateString();
    var last=localStorage.getItem("dailyspin_lastnotif");
    if(h2===8&&m===0&&last!==today){
      localStorage.setItem("dailyspin_lastnotif",today);
      var day=getDay(0);
      new Notification("Daily Spin \ud83c\udfa7",{body:day.classic.a+" \u2014 "+day.classic.t+" + "+day.obscure.a+" \u2014 "+day.obscure.t,icon:"icon-192.png",badge:"icon-192.png",tag:"daily-"+today});
    }
  },60000);
}
if("Notification" in window){
  if(Notification.permission==="granted")scheduleDaily();
  else if(Notification.permission!=="denied")setTimeout(function(){Notification.requestPermission().then(function(p){if(p==="granted")scheduleDaily()})},3000);
}

ReactDOM.render(h(App),document.getElementById("root"));
</script>

    navigator.serviceWorker.register('./sw.js').then(function(r){console.log('SW:',r.scope)}).catch(function(e){console.log('SW fail:',e)});
  });
}
