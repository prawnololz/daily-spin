<script>
const CLASSICS=[
{"a": "Miles Davis", "t": "Kind of Blue", "y": 1959, "g": "Jazz", "d": "Recorded in just two sessions at Columbia's 30th Street Studio with John Coltrane, Cannonball Adderley, Bill Evans, and others. Davis gave his musicians modal sketches instead of chord changes, encouraging spontaneous invention over rehearsed precision. Bill Evans compared the approach to Japanese visual art \u2014 single brush strokes that cannot be corrected. The original master tape ran slightly fast, meaning every version heard for decades was in the wrong key until a 1997 remaster. It remains the best-selling jazz album of all time, with over five million copies sold.", "tr": ["So What", "Freddie Freeloader", "Blue in Green", "All Blues", "Flamenco Sketches"], "s": [0, 2, 3]},
{"a": "John Coltrane", "t": "A Love Supreme", "y": 1965, "g": "Jazz", "d": "Recorded in a single session on December 9, 1964 at Van Gelder Studio. A four-part spiritual devotional written after Coltrane overcame heroin and alcohol addiction. During 'Acknowledgement,' he transposes the four-note theme through all twelve keys \u2014 finding the divine in every harmonic possibility. Performed live exactly once, at Antibes in July 1965. Coltrane died two years later at 40. The handwritten poem in the liner notes is one of jazz's most moving documents.", "tr": ["Acknowledgement", "Resolution", "Pursuance", "Psalm"], "s": [0, 2]},
{"a": "James Brown", "t": "Live at the Apollo", "y": 1963, "g": "Funk", "d": "King Records refused to fund it \u2014 nobody buys live albums. Brown paid himself. Recorded at Harlem's Apollo on October 24, 1962, the result \u2014 31 minutes of the most electrifying live performance ever captured \u2014 spent 66 weeks on the Billboard chart and sold over a million copies. Brown's band is a precision machine, his showmanship translating into kinetic energy even on vinyl. The album essentially invented funk and proved Black music could sell to mass audiences without compromise.", "tr": ["I'll Go Crazy", "Try Me", "Think", "I Don't Mind", "Lost Someone", "Please Please Please", "Night Train"], "s": [0, 5, 6]},
{"a": "The Beatles", "t": "Revolver", "y": 1966, "g": "Rock", "d": "Three months at Abbey Road pushed the studio beyond any previous pop album. 'Tomorrow Never Knows' used tape loops, backward guitars, and a Leslie speaker \u2014 Lennon wanted to sound like monks chanting on a mountaintop. 'Eleanor Rigby' featured a string octet with no Beatle playing. George Harrison's three contributions signaled his emergence as a songwriting force. It was the last album they promoted with a tour \u2014 after this, the studio became their instrument.", "tr": ["Taxman", "Eleanor Rigby", "I'm Only Sleeping", "Love You To", "Here There and Everywhere", "Yellow Submarine", "She Said She Said", "Good Day Sunshine", "And Your Bird Can Sing", "For No One", "Got to Get You into My Life", "Tomorrow Never Knows"], "s": [0, 1, 4, 11]},
{"a": "The Beatles", "t": "Abbey Road", "y": 1969, "g": "Rock", "d": "The last album they recorded together, though Let It Be was released later. Harrison emerged as an equal with 'Something' \u2014 Sinatra called it the greatest love song of fifty years \u2014 and 'Here Comes the Sun,' written in Eric Clapton's garden. The Side B medley stitches song fragments into a seamless suite representing their peak studio craft. Iain Macmillan's crosswalk photo took ten minutes on August 8, 1969, making that zebra crossing a permanent tourist destination. Over 31 million copies sold.", "tr": ["Come Together", "Something", "Maxwell's Silver Hammer", "Oh! Darling", "Octopus's Garden", "I Want You", "Here Comes the Sun", "Because", "You Never Give Me Your Money", "Golden Slumbers", "Carry That Weight", "The End"], "s": [0, 1, 6, 9]},
{"a": "The Beatles", "t": "Sgt. Pepper's Lonely Hearts Club Band", "y": 1967, "g": "Rock", "d": "Over 700 studio hours \u2014 unprecedented for pop. The fictional band concept freed them from expectations. 'A Day in the Life' bridges Lennon's surreal newspaper observations with McCartney's mundane morning, connected by a 40-piece orchestra instructed to play from their lowest note to their highest simultaneously. Peter Blake's cover collage featured 57 cutout figures and cost more than most albums of the era. It changed what an album could be \u2014 a unified artistic statement rather than a collection of singles.", "tr": ["Sgt. Pepper's Lonely Hearts Club Band", "With a Little Help from My Friends", "Lucy in the Sky with Diamonds", "Getting Better", "Fixing a Hole", "She's Leaving Home", "Being for the Benefit of Mr. Kite!", "Within You Without You", "When I'm Sixty-Four", "Lovely Rita", "Good Morning Good Morning", "A Day in the Life"], "s": [0, 2, 5, 11]},
{"a": "Bob Dylan", "t": "Highway 61 Revisited", "y": 1965, "g": "Folk Rock", "d": "Dylan went electric and the folk world lost its mind. Recorded in a week at Columbia's Studio A with Mike Bloomfield on scorching guitar. Al Kooper improvised the iconic organ on 'Like a Rolling Stone' after sneaking behind the keyboard \u2014 he was supposed to play guitar. The six-minute single, voted greatest song of all time, sold over a million copies in its first year. The album redefined what songwriting could address \u2014 surrealist imagery, social commentary, and confession fused into something entirely new.", "tr": ["Like a Rolling Stone", "Tombstone Blues", "It Takes a Lot to Laugh", "From a Buick 6", "Ballad of a Thin Man", "Queen Jane Approximately", "Highway 61 Revisited", "Desolation Row"], "s": [0, 4, 7]},
{"a": "Bob Dylan", "t": "Blonde on Blonde", "y": 1966, "g": "Folk Rock", "d": "Rock's first double album, recorded in Nashville with session musicians who'd never heard anything like Dylan's surrealist poetry. Musicians waited hours while he rewrote lyrics. 'Visions of Johanna' unfolds like a fever dream. 'Sad-Eyed Lady of the Lowlands' fills the entire fourth side. Dylan described the sound as 'that thin, wild mercury sound.' The Nashville cats delivered exactly that \u2014 the perfect marriage of professional precision and bohemian chaos.", "tr": ["Rainy Day Women", "Pledging My Time", "Visions of Johanna", "One of Us Must Know", "I Want You", "Stuck Inside of Mobile", "Just Like a Woman", "Absolutely Sweet Marie", "Sad-Eyed Lady of the Lowlands"], "s": [2, 5, 6, 8]},
{"a": "Bob Dylan", "t": "Blood on the Tracks", "y": 1975, "g": "Folk Rock", "d": "Written during the painful dissolution of his marriage to Sara, though he always denied it. Half was re-recorded in Minneapolis after he decided the New York sessions were too polished. 'Tangled Up in Blue' underwent constant revision \u2014 he changed verses in concert for decades. 'Idiot Wind' is one of the most lacerating songs ever about a relationship's end. His son Jakob later said it was like listening to his parents talking.", "tr": ["Tangled Up in Blue", "Simple Twist of Fate", "You're a Big Girl Now", "Idiot Wind", "You're Gonna Make Me Lonesome", "Meet Me in the Morning", "Lily Rosemary and the Jack of Hearts", "If You See Her Say Hello", "Shelter from the Storm", "Buckets of Rain"], "s": [0, 3, 8]},
{"a": "The Beach Boys", "t": "Pet Sounds", "y": 1966, "g": "Pop", "d": "Brian Wilson, inspired and intimidated by Rubber Soul, hired the Wrecking Crew while the band toured. He layered theremin, bicycle bells, Coca-Cola cans, and harpsichord into lush melancholy pop that left surf rock behind. Tony Asher provided lyrics of startling vulnerability. McCartney has repeatedly called it the greatest album ever, and it directly inspired Sgt. Pepper's. A commercial disappointment on release \u2014 Capitol was baffled \u2014 now universally revered as one of popular music's most important recordings.", "tr": ["Wouldn't It Be Nice", "You Still Believe in Me", "Don't Talk", "Sloop John B", "God Only Knows", "I Just Wasn't Made for These Times", "Pet Sounds", "Caroline No"], "s": [0, 4, 5]},
{"a": "Jimi Hendrix", "t": "Electric Ladyland", "y": 1968, "g": "Psychedelic Rock", "d": "Sprawling double album recorded over months at the Record Plant with a rotating cast. Sessions were chaotic \u2014 Hendrix recorded dozens of takes while hangers-on filled the studio. His 'All Along the Watchtower' became so definitive Dylan permanently adopted the arrangement. 'Voodoo Child (Slight Return)' was an impromptu jam when a film crew showed up needing footage \u2014 it became one of the greatest guitar recordings in history. Topped the US charts. Hendrix died two years later at 27.", "tr": ["And the Gods Made Love", "Have You Ever Been", "Crosstown Traffic", "Voodoo Chile", "Gypsy Eyes", "All Along the Watchtower", "Voodoo Child (Slight Return)"], "s": [3, 5, 6]},
{"a": "Otis Redding", "t": "Otis Blue", "y": 1965, "g": "Soul", "d": "Recorded in one 24-hour session at Stax Studios with Booker T. and the MGs, days after Sam Cooke's death. Redding channeled grief into devastating power \u2014 his 'Satisfaction' reinterprets the Stones as deep soul, while 'I've Been Loving You Too Long' became one of soul music's most aching ballads. His cover of 'A Change Is Gonna Come' serves as tribute and artistic statement. He was 23 and at the peak of his powers. Two years later he died in a plane crash at 26.", "tr": ["Ole Man Trouble", "Respect", "Change Gonna Come", "I've Been Loving You Too Long", "Shake", "My Girl", "Satisfaction", "You Don't Miss Your Water"], "s": [1, 3, 7]},
{"a": "The Velvet Underground", "t": "The Velvet Underground and Nico", "y": 1967, "g": "Art Rock", "d": "Produced by Andy Warhol, who contributed the banana cover and insisted on including German singer Nico. John Cale's viola drones and Lou Reed's unflinching lyrics about heroin, sadomasochism, and urban decay were unprecedented. Sold almost nothing \u2014 but as Brian Eno famously observed, everyone who bought one of those 30,000 copies started a band. Its influence on punk, post-punk, indie rock, and alternative music is incalculable.", "tr": ["Sunday Morning", "I'm Waiting for the Man", "Femme Fatale", "Venus in Furs", "Run Run Run", "All Tomorrow's Parties", "Heroin", "I'll Be Your Mirror", "European Son"], "s": [1, 3, 6, 7]},
{"a": "Nina Simone", "t": "I Put a Spell on You", "y": 1965, "g": "Jazz / Soul", "d": "She originally aspired to be the first Black female concert pianist at Curtis Institute \u2014 her rejection, which she attributed to racism, redirected her toward popular music with classical intensity. 'Feeling Good' became one of the most covered songs in history, though nobody matched her terrifying authority. The title track transforms Screamin' Jay Hawkins' novelty into something genuinely menacing. The album sits at the pivot between her jazz career and her increasingly radical activist period.", "tr": ["I Put a Spell on You", "Tomorrow Is My Turn", "Ne Me Quitte Pas", "Gimme Some", "Feeling Good", "Blues on Purpose", "You've Got to Learn"], "s": [0, 2, 4]},
{"a": "Aretha Franklin", "t": "I Never Loved a Man the Way I Love You", "y": 1967, "g": "Soul", "d": "Her Atlantic debut unleashed her after years of misguided jazz-pop at Columbia. The first session at FAME Studios collapsed when her husband fought a musician \u2014 only one song completed in Muscle Shoals. The rest finished in New York with the rhythm section flown up. 'Respect' transformed Otis Redding's song into a feminist and civil rights anthem. Franklin's vocals are staggering \u2014 controlled power with surgical precision. It established her as the undisputed Queen of Soul.", "tr": ["Respect", "Drown in My Own Tears", "I Never Loved a Man", "Soul Serenade", "Dr. Feelgood", "Good Times", "Do Right Woman", "Save Me", "A Change Is Gonna Come"], "s": [0, 4, 6, 8]},
{"a": "The Rolling Stones", "t": "Let It Bleed", "y": 1969, "g": "Rock", "d": "'Gimme Shelter' was recorded as the sixties dream curdled \u2014 Merry Clayton's ferocious backing vocal was so intense she suffered a miscarriage that night. Last album with Brian Jones, who drowned during recording. Keith plays bass on several tracks because Bill Wyman wasn't available. 'You Can't Always Get What You Want' features the London Bach Choir. Released five days before the Altamont Free Concert disaster \u2014 the album captures rock's innocence dying in real time.", "tr": ["Gimme Shelter", "Love in Vain", "Country Honk", "Live with Me", "Let It Bleed", "Midnight Rambler", "You Got the Silver", "Monkey Man", "You Can't Always Get What You Want"], "s": [0, 1, 5, 8]},
{"a": "The Rolling Stones", "t": "Exile on Main St.", "y": 1972, "g": "Rock", "d": "Recorded in Keith's basement at Villa Nellcote in southern France \u2014 tax exiles, heroin, visitors, humidity warping tapes. The murkiest, swampiest double album in rock history. 'Tumbling Dice' took months. 'Rocks Off' captures their ramshackle genius perfectly. Critics were mixed on release but it's now widely considered their masterpiece \u2014 the sound of the world's greatest rock band playing loose enough to fall apart but never quite doing so.", "tr": ["Rocks Off", "Rip This Joint", "Shake Your Hips", "Casino Boogie", "Tumbling Dice", "Sweet Virginia", "Torn and Frayed", "Loving Cup", "Happy", "All Down the Line", "Shine a Light", "Soul Survivor"], "s": [0, 4, 8, 9]},
{"a": "Marvin Gaye", "t": "What's Going On", "y": 1971, "g": "Soul", "d": "Inspired by police brutality witnessed by a Four Tops member and letters from Gaye's brother in Vietnam. Berry Gordy shelved it as uncommercial until Gaye threatened to never record again. Pioneered layered vocal technique and continuous sequencing \u2014 it plays as one unbroken piece. War, poverty, ecology, and spiritual yearning were radical for pop in 1971. Became Motown's fastest-selling album and is now routinely ranked among the greatest ever made.", "tr": ["What's Going On", "What's Happening Brother", "Flyin' High", "Save the Children", "God Is Love", "Mercy Mercy Me", "Right On", "Inner City Blues"], "s": [0, 5, 7]},
{"a": "Pink Floyd", "t": "The Dark Side of the Moon", "y": 1973, "g": "Progressive Rock", "d": "937 weeks on the Billboard 200 \u2014 a record that may never be broken. Recorded at Abbey Road with engineer Alan Parsons, this concept album about conflict, greed, time, and madness sold over 45 million copies. Storm Thorgerson's prism cover became one of music's most iconic images. Every track flows seamlessly across 43 unbroken minutes. Roger Waters' lyrics were partly inspired by the mental deterioration of founding member Syd Barrett, who had left the band years earlier.", "tr": ["Speak to Me", "Breathe", "On the Run", "Time", "The Great Gig in the Sky", "Money", "Us and Them", "Any Colour You Like", "Brain Damage", "Eclipse"], "s": [3, 4, 5, 6]},
{"a": "Pink Floyd", "t": "Wish You Were Here", "y": 1975, "g": "Progressive Rock", "d": "A tribute to Syd Barrett, who showed up at the sessions bloated and shaven-headed \u2014 the band didn't recognize him at first. 'Shine On You Crazy Diamond' spans 26 minutes, its mournful four-note guitar motif one of the most recognizable in rock. The title track \u2014 just Waters and Gilmour on acoustic guitars \u2014 is one of rock's most perfect and emotionally devastating songs. The album's themes of absence, industry, and mental illness remain deeply personal despite their epic sonic scale.", "tr": ["Shine On You Crazy Diamond I-V", "Welcome to the Machine", "Have a Cigar", "Wish You Were Here", "Shine On You Crazy Diamond VI-IX"], "s": [0, 3]},
{"a": "Led Zeppelin", "t": "Led Zeppelin IV", "y": 1971, "g": "Hard Rock", "d": "Officially untitled \u2014 four symbols, no identifying information. Recorded at Headley Grange using the Stones' mobile studio. Bonham's drums on 'When the Levee Breaks' \u2014 recorded in a stairwell with distant mics \u2014 became foundational to hip hop sampling. 'Stairway to Heaven' is FM radio's most played song despite never being a single. Over 37 million copies sold worldwide, making it one of the best-selling albums in history.", "tr": ["Black Dog", "Rock and Roll", "The Battle of Evermore", "Stairway to Heaven", "Misty Mountain Hop", "Four Sticks", "Going to California", "When the Levee Breaks"], "s": [0, 3, 6, 7]},
{"a": "David Bowie", "t": "Ziggy Stardust", "y": 1972, "g": "Glam Rock", "d": "An alien rock messiah who comes to Earth with a message of hope but is corrupted by fame and destroyed by his band. Inspired by Iggy Pop's self-destruction, Kubrick's 2001, and doomed rocker Vince Taylor. Mick Ronson's guitar elevated folk compositions into glam anthems. Bowie inhabited Ziggy so completely the line between performer and role dissolved. He killed the character on stage at the Hammersmith Odeon on July 3, 1973 after eighteen months, stunning both audience and bandmates.", "tr": ["Five Years", "Soul Love", "Moonage Daydream", "Starman", "Lady Stardust", "Star", "Hang On to Yourself", "Ziggy Stardust", "Suffragette City", "Rock 'n' Roll Suicide"], "s": [0, 2, 3, 7]},
{"a": "David Bowie", "t": "Low", "y": 1977, "g": "Art Rock", "d": "First Berlin Trilogy album with Eno. Side A: fractured art-pop songs with lyrics pared to fragments. Side B: ambient instrumentals inspired by Kraftwerk and the divided city outside Hansa Studios. Bowie was recovering from cocaine addiction and a collapsing marriage. 'Sound and Vision' was a UK hit despite being utterly unconventional \u2014 two minutes of instrumental before a single verse. The album was his bravest reinvention, and for a man who reinvented himself constantly, that's saying something.", "tr": ["Speed of Life", "Breaking Glass", "What in the World", "Sound and Vision", "Always Crashing in the Same Car", "Be My Wife", "A New Career in a New Town", "Warszawa", "Art Decade", "Subterraneans"], "s": [3, 4, 7, 9]},
{"a": "David Bowie", "t": "Station to Station", "y": 1976, "g": "Art Rock", "d": "The Thin White Duke, subsisting on cocaine, red peppers, and milk. Bowie later claimed to have no memory of making it. The ten-minute title track journeys from brooding funk to euphoric krautrock. 'Golden Years' was offered to Elvis, who declined. It bridges the plastic soul of Young Americans and Berlin's electronic experimentation. Created in addiction's grip, it's immaculately constructed \u2014 the sound of a brilliant mind at dangerous speed.", "tr": ["Station to Station", "Golden Years", "Word on a Wing", "TVC 15", "Stay", "Wild Is the Wind"], "s": [0, 1, 4]},
{"a": "Stevie Wonder", "t": "Songs in the Key of Life", "y": 1976, "g": "Soul / Funk", "d": "Sprawling double album with bonus EP \u2014 so ambitious it was delayed over two years. More than 130 musicians, including Herbie Hancock and Minnie Riperton. Entered Billboard at number one \u2014 only the third album ever to do so. 'Sir Duke' celebrates music's joy. 'I Wish' is pure nostalgic funk. 'Isn't She Lovely' features his newborn daughter Aisha. Won Album of the Year and is frequently cited as the greatest album in popular music history.", "tr": ["Love's in Need of Love Today", "Village Ghetto Land", "Sir Duke", "I Wish", "Pastime Paradise", "Isn't She Lovely", "Joy Inside My Tears", "As", "Another Star"], "s": [2, 3, 5, 7]},
{"a": "Stevie Wonder", "t": "Innervisions", "y": 1973, "g": "Soul / Funk", "d": "Third of his extraordinary early-70s run. Three days after release, Wonder was nearly killed when a log crashed through his windshield, leaving him in a coma for four days. 'Living for the City' packs an entire film's narrative into six minutes, complete with a cinematic interlude. 'Higher Ground' was the first song his road manager sang in his ear upon waking from the coma. Won three Grammys including Album of the Year. A synthesizer-driven marvel exploring social themes with unprecedented sophistication.", "tr": ["Too High", "Visions", "Living for the City", "Golden Lady", "Higher Ground", "All in Love Is Fair", "Don't You Worry Bout a Thing", "He's Misstra Know-It-All"], "s": [2, 4, 6]},
{"a": "Joni Mitchell", "t": "Blue", "y": 1971, "g": "Folk", "d": "Minimal accompaniment \u2014 just Mitchell's piano, guitar, and Appalachian dulcimer. She was 27, navigating breakups with Graham Nash and James Taylor, and carrying the secret grief of a daughter given up for adoption years earlier. Engineer Henry Lewy said she was 'about as emotionally open as a human being can be.' Kris Kristofferson, witnessing the sessions, reportedly told her to 'save something for yourself.' She didn't. Every song is exposed nerve, and it remains the standard against which confessional songwriting is measured.", "tr": ["All I Want", "My Old Man", "Little Green", "Carey", "Blue", "California", "This Flight Tonight", "River", "A Case of You", "The Last Time I Saw Richard"], "s": [3, 5, 7, 8]},
{"a": "Neil Young", "t": "After the Gold Rush", "y": 1970, "g": "Folk Rock", "d": "Recorded in Young's basement in Topanga Canyon with 18-year-old Nils Lofgren, who learned piano specifically for these sessions. The lo-fi quality was partly the cramped space, but it gives the album an intimacy that suits Young's quavering tenor perfectly. 'Only Love Can Break Your Heart' was written for Graham Nash after his breakup with Joni Mitchell. 'Southern Man' provoked Lynyrd Skynyrd's 'Sweet Home Alabama.' The title track imagines environmental apocalypse in three spare verses. Over 6 million copies.", "tr": ["Tell Me Why", "After the Gold Rush", "Only Love Can Break Your Heart", "Southern Man", "Don't Let It Bring You Down", "Birds", "When You Dance I Can Really Love", "I Believe in You", "Cripple Creek Ferry"], "s": [1, 2, 3]},
{"a": "Fleetwood Mac", "t": "Rumours", "y": 1977, "g": "Rock", "d": "Recorded while every couple in the band was splitting \u2014 John and Christine McVie divorcing, Buckingham and Nicks freshly broken up, Fleetwood discovering his wife's affair with his best friend. The emotional wreckage fueled extraordinary songwriting, and prodigious cocaine use fueled the sessions. Buckingham's 'Go Your Own Way' is a breakup anthem written about Nicks, who had to sing backup on it. 31 weeks at number one, over 40 million copies sold \u2014 proof that misery loves great pop hooks.", "tr": ["Second Hand News", "Dreams", "Never Going Back Again", "Don't Stop", "Go Your Own Way", "Songbird", "The Chain", "You Make Loving Fun", "I Don't Want to Know", "Gold Dust Woman"], "s": [1, 4, 6, 9]},
{"a": "Kraftwerk", "t": "Trans-Europe Express", "y": 1977, "g": "Electronic", "d": "Recorded at Kling Klang Studio in Dusseldorf, perfecting their vision of elegant electronic music inspired by European train travel and the tension between man and machine. The title track's hypnotic motorik rhythm became foundational to electro, techno, and hip hop \u2014 Afrika Bambaataa sampled it for 'Planet Rock' in 1982, igniting electro-funk. David Bowie, recording Low and Heroes in Berlin, called them 'the sound of the future.' The album influenced Detroit techno, synth-pop, and virtually every electronic movement that followed.", "tr": ["Europe Endless", "The Hall of Mirrors", "Showroom Dummies", "Trans-Europe Express", "Metal on Metal", "Franz Schubert", "Endless Endless"], "s": [0, 3, 4]},
{"a": "Talking Heads", "t": "Remain in Light", "y": 1980, "g": "New Wave", "d": "David Byrne and Brian Eno merged Fela Kuti's Afrobeat with New York art-punk at Compass Point Studios in Nassau. The band jammed over loops until tracks emerged \u2014 a process that created tension with the more structured Chris Frantz and Tina Weymouth. Adrian Belew's guitar added otherworldly textures. 'Once in a Lifetime' became an existential crisis set to a bassline, its video an MTV landmark. The album predicted sample-based, groove-oriented music by a full decade.", "tr": ["Born Under Punches", "Crosseyed and Painless", "The Great Curve", "Once in a Lifetime", "Houses in Motion", "Seen and Not Seen", "Listening Wind", "The Overload"], "s": [0, 1, 3]},
{"a": "Donna Summer", "t": "I Remember Yesterday", "y": 1977, "g": "Disco", "d": "Each track adopts the style of a different dance era, from 40s swing to Motown to disco, culminating in 'I Feel Love' \u2014 built entirely from Moog synthesizer sequences. When Brian Eno heard it, he reportedly told David Bowie 'this is the sound of the future.' He was right: its pulsing pattern became the foundation of synth-pop, house, techno, and trance. Three and a half minutes of pure electronic dance music in 1977 \u2014 nothing in pop had ever sounded so deliberately artificial, or so thrilling.", "tr": ["I Remember Yesterday", "Love's Unkind", "Back in Love Again", "Black Lady", "Take Me", "Can't We Just Sit Down", "I Feel Love"], "s": [6]},
{"a": "Parliament", "t": "Mothership Connection", "y": 1975, "g": "Funk", "d": "George Clinton's P-Funk collective created the funk motherlode \u2014 a concept album about aliens bringing funk to Earth via the Mothership. Bootsy Collins's elastic bass, Bernie Worrell's cosmic synths, and the Horny Horns. 'Give Up the Funk (Tear the Roof Off the Sucker)' became one of hip hop's most sampled tracks. The stage show featured a literal spaceship landing. Pure, uncut, interplanetary funk, and the most joyful music of the 1970s.", "tr": ["P-Funk", "Mothership Connection", "Unfunky UFO", "Supergroovalisticprosifunkstication", "Handcuffs", "Give Up the Funk", "Night of the Thumpasorus Peoples"], "s": [0, 1, 5]},
{"a": "Herbie Hancock", "t": "Head Hunters", "y": 1973, "g": "Jazz Funk", "d": "The first jazz album to go platinum. 'Chameleon' \u2014 fifteen minutes of interlocking clavinet, synthesizer, and bass \u2014 became one of the most recognizable hooks in music. Hancock used an ARP Odyssey, ARP Soloist, and Hohner D6 clavinet to create entirely new jazz sounds. Sold over a million copies within a year, infuriating purists who called it a sellout. But its fusion of jazz improvisation with funk groove predicted and influenced hip hop, acid jazz, and electronic music for decades.", "tr": ["Chameleon", "Watermelon Man", "Sly", "Vein Melter"], "s": [0, 1]},
{"a": "Curtis Mayfield", "t": "Superfly", "y": 1972, "g": "Soul / Funk", "d": "The soundtrack that transcended its blaxploitation film. Wah-wah guitars over orchestral funk arrangements, with lyrics that humanized drug dealers rather than glorifying them \u2014 'Pusherman' makes you sympathize with the pusher while understanding the destruction. 'Freddie's Dead' was a Top 5 single. Mayfield's falsetto and socially conscious writing elevated what could have been exploitation into genuine art. The finest soundtrack album ever made, and a political statement about urban poverty.", "tr": ["Little Child Runnin' Wild", "Pusherman", "Freddie's Dead", "Give Me Your Love", "Eddie You Should Know Better", "Think", "Superfly"], "s": [1, 2, 6]},
{"a": "Al Green", "t": "Let's Stay Together", "y": 1972, "g": "Soul", "d": "Recorded at Royal Recording Studio in Memphis with producer Willie Mitchell and the Hi Rhythm Section. Green's falsetto \u2014 gentle but with an undercurrent of intense desire \u2014 floats over Mitchell's immaculate production: warm horns, sinuous guitar, and a rhythm section that plays behind the beat with supernatural patience. The title track topped both pop and R&B charts. Mitchell's engineering at Royal Studio created a 'room sound' that engineers still try to replicate fifty years later.", "tr": ["Let's Stay Together", "La-La for You", "So You're Leaving", "What Is This Feeling", "I've Never Found a Girl", "How Can You Mend a Broken Heart", "Judy"], "s": [0, 5]},
{"a": "Sly and the Family Stone", "t": "There's a Riot Goin' On", "y": 1971, "g": "Funk", "d": "Sly Stone, increasingly addicted to cocaine and PCP, retreated to his Bel Air mansion and spent months overdubbing every instrument on a four-track. The result is the opposite of the Family Stone's earlier joyous funk \u2014 murky, paranoid, and drugged-out, with drum machines replacing live drums on many tracks. 'Family Affair' topped the charts despite being wildly unconventional. Its influence on hip hop, lo-fi, and experimental R&B is enormous \u2014 D'Angelo and Erykah Badu cite it as foundational.", "tr": ["Luv N Haight", "Just Like a Baby", "Poet", "Family Affair", "Africa Talks to You", "Smilin", "Time", "Runnin Away", "Thank You for Talkin to Me Africa"], "s": [3, 7, 8]},
{"a": "Brian Eno", "t": "Another Green World", "y": 1975, "g": "Art Rock", "d": "Used Oblique Strategies cards to make creative decisions, treating the studio itself as an instrument. Phil Collins, Robert Fripp, and John Cale contributed, though Eno often processed their playing beyond recognition. Only five of fourteen tracks feature vocals. The instrumental pieces essentially invented ambient music two years before Eno formalized the term with Music for Airports. David Bowie was so inspired he invited Eno to produce his Berlin trilogy. The album where rock quietly stopped being just rock.", "tr": ["Sky Saw", "Over Fire Island", "St. Elmo's Fire", "In Dark Trees", "The Big Ship", "I'll Come Running", "Another Green World", "Golden Hours", "Becalmed", "Spirits Drifting"], "s": [2, 4, 7, 8]},
{"a": "Iggy Pop", "t": "The Idiot", "y": 1977, "g": "Art Rock", "d": "After the Stooges' implosion and Iggy's institutionalization, Bowie rescued him, bringing Iggy to France and then Hansa Studios in Berlin. Cold, mechanistic art-rock heavily influenced by Kraftwerk \u2014 nothing like the Stooges. 'Nightclubbing' was later sampled by Grace Jones. 'China Girl' was rerecorded by Bowie. The album effectively invented post-punk: Joy Division's Ian Curtis was listening to it the night he died. Iggy and Bowie's Berlin period produced some of the most important music of the late 1970s.", "tr": ["Sister Midnight", "Nightclubbing", "Funtime", "Baby", "China Girl", "Dum Dum Boys", "Tiny Girls", "Mass Production"], "s": [0, 1, 4, 7]},
{"a": "The Stooges", "t": "Fun House", "y": 1970, "g": "Proto-Punk", "d": "Recorded essentially live at Elektra Sound Recorders, capturing legendary stage intensity on tape. Saxophonist Steve Mackay was added for extra chaos. Side two descends into free-jazz noise that anticipates punk, industrial, and noise rock by years. Sold almost nothing and Elektra dropped the band. But its influence on punk is foundational \u2014 every band from the Sex Pistols to the Birthday Party to Mudhong owes something to Fun House's uncompromising commitment to raw power over polish.", "tr": ["Down on the Street", "Loose", "T.V. Eye", "Dirt", "1970", "Fun House", "L.A. Blues"], "s": [0, 2, 5]},
{"a": "Fela Kuti", "t": "Zombie", "y": 1977, "g": "Afrobeat", "d": "Two side-long tracks mocking the Nigerian military as mindless zombies following orders. A thousand soldiers attacked his commune in response, beating residents and throwing his 78-year-old mother from a window \u2014 she later died from injuries. Fela sent her coffin to the army barracks. He was arrested, beaten, and his commune burned. He responded by releasing even more politically charged music. The most dangerous album ever made, by the most fearless musician who ever lived.", "tr": ["Zombie", "Mister Follow Follow"], "s": [0, 1]},
{"a": "Black Sabbath", "t": "Paranoid", "y": 1970, "g": "Heavy Metal", "d": "Heavy metal's founding document, recorded in four days at Regent Sound Studios. Tony Iommi had lost two fingertips in a factory accident, forcing him to downtune and use lighter strings \u2014 the thick, doom-laden tone accidentally invented the metal guitar sound. The title track was written in twenty minutes as filler and became their biggest hit. 'War Pigs' opens with air-raid sirens. 'Iron Man' features one of rock's most recognizable riffs. Every heavy subgenre \u2014 thrash, doom, death \u2014 traces its lineage here.", "tr": ["War Pigs", "Paranoid", "Planet Caravan", "Iron Man", "Electric Funeral", "Hand of Doom", "Rat Salad", "Fairies Wear Boots"], "s": [0, 1, 3]},
{"a": "Steely Dan", "t": "Aja", "y": 1977, "g": "Jazz Rock", "d": "Over forty session musicians pursuing impossible perfection. Seven guitarists attempted the 'Peg' solo before Jay Graydon nailed it. Steve Gadd's drum fill on the title track is considered one of the greatest in recording history. Wayne Shorter's saxophone solo was done in a single take. Fagen and Becker's jazz-rock demanded flawless execution of incredibly complex arrangements. Audiophiles still use it to test high-fidelity systems \u2014 the recording quality is that pristine, fifty years on.", "tr": ["Black Cow", "Aja", "Deacon Blues", "Peg", "Home at Last", "I Got the News", "Josie"], "s": [1, 2, 3]},
{"a": "Television", "t": "Marquee Moon", "y": 1977, "g": "Post-Punk", "d": "Tom Verlaine and Richard Lloyd invented a new guitar vocabulary \u2014 angular, clean-toned, endlessly ascending. The ten-minute title track builds through three movements of intertwining leads that never repeat. Recorded in three weeks at A&R Studios in New York. A commercial failure in America but a sensation in the UK, it became foundational to post-punk, alternative rock, and indie music. The twin guitar interplay influenced everyone from R.E.M. to Radiohead.", "tr": ["See No Evil", "Venus", "Friction", "Marquee Moon", "Elevation", "Guiding Light", "Prove It", "Torn Curtain"], "s": [0, 1, 3, 6]},
{"a": "Wire", "t": "Pink Flag", "y": 1977, "g": "Post-Punk", "d": "Twenty-one songs in thirty-five minutes, recorded in eight days. Most songs are under two minutes \u2014 not because they're unfinished but because Wire saw no reason to repeat a chorus when once made the point. Colin Newman's deadpan vocals, Bruce Gilbert's abrasive guitar, and Graham Lewis's melodic bass created a template for post-punk, hardcore, and indie rock. Black Flag, Minor Threat, R.E.M., and Elastica all cite it. They'd outgrown it by album two. The most efficient punk album ever made.", "tr": ["Reuters", "Field Day for the Sundays", "Three Girl Rhumba", "Ex Lion Tamer", "Lowdown", "Brazil", "Pink Flag", "Mannequin", "12XU"], "s": [0, 3, 7, 8]},
{"a": "Ramones", "t": "Ramones", "y": 1976, "g": "Punk Rock", "d": "Fourteen songs in twenty-nine minutes, recorded in seven days for $6,400. Four leather-jacketed guys from Queens who couldn't really play their instruments invented punk rock by stripping rock and roll to three chords, 200 BPM tempos, and two-minute songs. Tommy's minimalist drums and Dee Dee's 'one-two-three-four' count-ins became iconic. Initially sold only 6,000 copies, but as Eno supposedly said about the Velvets \u2014 everyone who bought it started a band.", "tr": ["Blitzkrieg Bop", "Beat on the Brat", "Judy Is a Punk", "I Wanna Be Your Boyfriend", "Chain Saw", "Now I Wanna Sniff Some Glue", "Loudmouth", "Listen to My Heart", "Today Your Love Tomorrow the World"], "s": [0, 2, 3]},
{"a": "Patti Smith", "t": "Horses", "y": 1975, "g": "Punk Rock", "d": "Produced by John Cale at Electric Lady Studios. Opens with 'Jesus died for somebody's sins but not mine' \u2014 punk rock's birth announcement arriving two years before the Sex Pistols. Smith fused beat poetry, Rimbaud, and feminist fury into something new. Robert Mapplethorpe's androgynous cover photograph became one of music's most iconic images. 'Land' is a three-part, ten-minute suite moving from violent narrative to ecstatic crescendo. The album proved punk could be intellectual, literary, and female.", "tr": ["Gloria", "Redondo Beach", "Birdland", "Free Money", "Kimberly", "Break It Up", "Land", "Elegie"], "s": [0, 3, 6]},
{"a": "Nick Drake", "t": "Pink Moon", "y": 1972, "g": "Folk", "d": "Two late-night sessions, no overdubs, no other musicians \u2014 just Drake and his guitar, with a brief piano overdub on the title track. He dropped off the tapes at Island Records and left without speaking to anyone. Sold fewer than 5,000 copies. He died two years later at 26 of an antidepressant overdose. A 1999 Volkswagen commercial sparked massive reassessment. Original pressings now sell for thousands. One of the most hauntingly beautiful acoustic recordings ever made.", "tr": ["Pink Moon", "Place to Be", "Road", "Which Will", "Horn", "Things Behind the Sun", "Know", "Parasite", "From the Morning"], "s": [0, 1, 5, 8]},
{"a": "Bob Marley", "t": "Exodus", "y": 1977, "g": "Reggae", "d": "Recorded at Island Records' Basing Street Studios in London after an assassination attempt in Jamaica \u2014 gunmen shot Marley, his wife Rita, and his manager. The exile produced their most polished and commercially successful album. The first half addresses political struggle; the second is pure celebration. 'Jamming,' 'One Love,' and 'Three Little Birds' became the songs that introduced reggae to the global mainstream. Time magazine named it the most important album of the 20th century.", "tr": ["Natural Mystic", "So Much Things to Say", "Guiltiness", "The Heathen", "Exodus", "Jamming", "Waiting in Vain", "Three Little Birds", "One Love"], "s": [0, 4, 5, 8]},
{"a": "The Clash", "t": "London Calling", "y": 1979, "g": "Punk Rock", "d": "Double album sold at single-album price \u2014 Joe Strummer insisted. Producer Guy Stevens threw chairs and ladders to keep the energy up. Pennie Smith's photo of Paul Simonon smashing his bass is the greatest rock photograph. 'Train in Vain' was added last minute and wasn't even listed on the sleeve. The album proved punk could contain multitudes \u2014 reggae, rockabilly, jazz, and soul alongside the fury. Over 5 million copies and regularly voted among the greatest albums ever made.", "tr": ["London Calling", "Brand New Cadillac", "Jimmy Jazz", "Rudie Can't Fail", "Spanish Bombs", "Lost in the Supermarket", "Clampdown", "The Guns of Brixton", "Train in Vain"], "s": [0, 4, 5, 7]},
{"a": "Joy Division", "t": "Unknown Pleasures", "y": 1979, "g": "Post-Punk", "d": "Four young men from Salford, three weeks at Strawberry Studios with producer Martin Hannett, whose obsessive production techniques \u2014 recording breaking glass, using digital delay units, separating the band in the studio \u2014 drove the musicians mad but created something extraordinary. Peter Saville's pulsar cover became the most reproduced image in music merchandise. Curtis suffered from epilepsy and depression. He died by suicide the following year at 23, on the eve of their first American tour.", "tr": ["Disorder", "Day of the Lords", "Candidate", "Insight", "New Dawn Fades", "She's Lost Control", "Shadowplay", "Wilderness", "I Remember Nothing"], "s": [0, 4, 5, 6]},
{"a": "Grateful Dead", "t": "American Beauty", "y": 1970, "g": "Folk Rock", "d": "Studio album capturing the Dead's acoustic, country-folk side \u2014 the counterpoint to their legendary live improvisations. 'Truckin'' became an inadvertent counterculture anthem. 'Ripple' is pure distilled beauty, Jerry Garcia's most perfect melody. 'Box of Rain' was bassist Phil Lesh's tribute to his dying father. Garcia's pedal steel guitar throughout adds warmth. The studio record that best captures what made them transcendent \u2014 communal music-making elevated to something spiritual.", "tr": ["Box of Rain", "Friend of the Devil", "Sugar Magnolia", "Operator", "Candyman", "Ripple", "Brokedown Palace", "Attics of My Life", "Truckin'"], "s": [1, 5, 6, 8]},
{"a": "The Who", "t": "Who's Next", "y": 1971, "g": "Rock", "d": "Born from the ashes of Pete Townshend's abandoned Lifehouse project \u2014 a rock opera about virtual reality decades before it existed. 'Baba O'Riley' melds Townshend's synthesizer experiments with rock power, named after minimalist composer Terry Riley and spiritual teacher Meher Baba. 'Won't Get Fooled Again' ends with Keith Moon's most explosive drum break and Roger Daltrey's primal scream. What survived from the wreckage of an impossible concept was their most powerful album.", "tr": ["Baba O'Riley", "Bargain", "Love Ain't for Keeping", "My Wife", "The Song Is Over", "Going Mobile", "Behind Blue Eyes", "Won't Get Fooled Again"], "s": [0, 6, 7]},
{"a": "Simon & Garfunkel", "t": "Bridge Over Troubled Water", "y": 1970, "g": "Folk Rock", "d": "Their final studio album, recorded as their friendship disintegrated. Garfunkel was increasingly focused on acting; Simon was writing more complex material. The title track \u2014 inspired by a Swan Silvertones gospel song, with Garfunkel's multitracked vocals over Larry Knechtel's piano \u2014 spent six weeks at number one. Simon later admitted regretting giving it to Garfunkel to sing. 'The Boxer' required over 100 hours across multiple studios. Six Grammy Awards.", "tr": ["Bridge Over Troubled Water", "El Condor Pasa", "Cecilia", "So Long Frank Lloyd Wright", "The Boxer", "Baby Driver", "The Only Living Boy in New York", "Song for the Asking"], "s": [0, 2, 4, 6]},
{"a": "Elton John", "t": "Goodbye Yellow Brick Road", "y": 1973, "g": "Pop / Rock", "d": "Double album recorded in two weeks at Chateau d'Herouville in France. 'Bennie and the Jets' and 'Candle in the Wind' became permanent standards. 'Saturday Night's Alright for Fighting' is pure glam-rock energy. Bernie Taupin's lyrics and Elton's melodies were at their peak \u2014 extravagant, emotional, and impossibly catchy. The album represents peak Elton: flamboyant, prolific, and operating at a creative level he'd never quite reach again.", "tr": ["Funeral for a Friend", "Candle in the Wind", "Bennie and the Jets", "Goodbye Yellow Brick Road", "Saturday Night's Alright for Fighting", "Harmony"], "s": [0, 1, 2, 3]},
{"a": "Prince", "t": "Purple Rain", "y": 1984, "g": "Pop / Rock", "d": "Recorded at his home studio and live at First Avenue in Minneapolis. 'When Doves Cry' was radical \u2014 Prince removed the bass entirely from a pop single, and it still hit number one. The album spent 24 weeks at the top, sold 25 million copies, and won an Academy Award for its accompanying film. The title track's guitar solo was recorded in one take and is consistently ranked among the greatest ever played. Prince played almost every instrument.", "tr": ["Let's Go Crazy", "Take Me with U", "The Beautiful Ones", "Computer Blue", "Darling Nikki", "When Doves Cry", "I Would Die 4 U", "Baby I'm a Star", "Purple Rain"], "s": [0, 3, 5, 8]},
{"a": "Prince", "t": "Sign o' the Times", "y": 1987, "g": "Funk", "d": "Originally a triple album trimmed to two discs. The title track opens by addressing AIDS, crack, gang violence, and natural disasters over a stark drum machine. 'If I Was Your Girlfriend' explored gender fluidity years before the mainstream conversation. 'Adore' is among the most sensual slow jams ever recorded. His most diverse work \u2014 spanning funk, pop, psychedelia, gospel, and jazz \u2014 and arguably his greatest artistic achievement.", "tr": ["Sign o' the Times", "Play in the Sunshine", "Housequake", "The Ballad of Dorothy Parker", "Starfish and Coffee", "Forever in My Life", "U Got the Look", "If I Was Your Girlfriend", "I Could Never Take the Place of Your Man", "Adore"], "s": [0, 3, 7, 9]},
{"a": "Michael Jackson", "t": "Thriller", "y": 1982, "g": "Pop", "d": "Seventy million copies \u2014 best-selling album of all time. Produced by Quincy Jones, seven of nine tracks became Top 10 singles. Eddie Van Halen's 'Beat It' guitar solo was unpaid \u2014 he did it as a favor. Vincent Price's spoken-word section was done in two takes. John Landis directed the fourteen-minute 'Thriller' video for $500,000, now in the Library of Congress. At its commercial peak, the album was selling one million copies per week.", "tr": ["Wanna Be Startin Somethin", "Baby Be Mine", "The Girl Is Mine", "Thriller", "Beat It", "Billie Jean", "Human Nature", "P.Y.T.", "The Lady in My Life"], "s": [0, 3, 4, 5]},
{"a": "Kate Bush", "t": "Hounds of Love", "y": 1985, "g": "Art Pop", "d": "Bush built a 48-track studio in her family's barn in Kent to achieve complete creative control. Side A contains five near-perfect singles, each a miniature world. Side B \u2014 'The Ninth Wave' \u2014 is a concept suite about a woman adrift at sea, hovering between consciousness and dream. 'Running Up That Hill' made her a global star again in 2022, nearly four decades later, when Stranger Things introduced her to a new generation. The album proves that pop music can be genuinely visionary.", "tr": ["Running Up That Hill", "Hounds of Love", "The Big Sky", "Mother Stands for Comfort", "Cloudbusting", "And Dream of Sheep", "Under Ice", "Waking the Witch", "Jig of Life", "Hello Earth", "The Morning Fog"], "s": [0, 1, 4, 10]},
{"a": "The Smiths", "t": "The Queen Is Dead", "y": 1986, "g": "Indie Rock", "d": "Recorded during legal battles with their label and escalating personal tensions. Johnny Marr's guitar playing \u2014 jangly, layered, rhythmically inventive \u2014 reached its peak. 'There Is a Light That Never Goes Out' pairs a death wish with one of pop's most uplifting melodies, creating an irony that perfectly encapsulates the Smiths' genius. The title track uses a Cicely Courtneidge sample as a launchpad for seven minutes of anti-monarchist fury. The peak of 1980s independent music.", "tr": ["The Queen Is Dead", "Frankly Mr Shankly", "I Know It's Over", "Cemetry Gates", "Bigmouth Strikes Again", "The Boy with the Thorn in His Side", "There Is a Light That Never Goes Out", "Some Girls Are Bigger Than Others"], "s": [0, 2, 4, 6]},
{"a": "Tom Waits", "t": "Rain Dogs", "y": 1985, "g": "Experimental Rock", "d": "Junkyard orchestration \u2014 marimbas, banjos, accordion, pump organ, and Waits's demolished-gravel voice singing tales of drifters and outcasts. Marc Ribot's angular, dissonant guitar became a Waits signature, and Keith Richards guested. Recorded at RCA Studios in New York, it sounds like a city at four in the morning viewed through the bottom of a whiskey bottle. Neither jazz, rock, nor folk \u2014 it invented its own genre of beautiful wreckage.", "tr": ["Singapore", "Clap Hands", "Cemetery Polka", "Jockey Full of Bourbon", "Tango Till They're Sore", "Time", "Rain Dogs", "9th and Hennepin", "Gun Street Girl", "Downtown Train", "Anywhere I Lay My Head"], "s": [0, 3, 5, 9]},
{"a": "Sade", "t": "Diamond Life", "y": 1984, "g": "Smooth Jazz / Soul", "d": "Sade Adu's impossibly cool contralto over jazz-inflected sophisti-pop created a new category of elegance in pop music. 'Smooth Operator' established the template \u2014 unhurried, graceful, with a narrative specificity rare in pop. Every track maintains impossible poise without ever becoming cold. The band was a genuine group, not a vehicle for a singer, and their restraint was radical in the maximalist mid-80s. Went quadruple platinum worldwide.", "tr": ["Smooth Operator", "Your Love Is King", "Hang On to Your Love", "Frankie's First Affair", "When Am I Going to Make a Living", "Sally", "Why Can't We Live Together"], "s": [0, 1, 2]},
{"a": "AC/DC", "t": "Back in Black", "y": 1980, "g": "Hard Rock", "d": "The first album after lead singer Bon Scott's death from alcohol poisoning, with new vocalist Brian Johnson. The opening funeral bell of 'Hells Bells' announces both mourning and defiance. The title track's riff is pure distilled electricity \u2014 Malcolm Young's rhythm guitar is one of the great forces of nature in rock music. Fifty million copies sold worldwide, making it the second-best-selling album of all time after Thriller.", "tr": ["Hells Bells", "Shoot to Thrill", "What Do You Do for Money Honey", "Back in Black", "You Shook Me All Night Long", "Have a Drink on Me", "Rock and Roll Ain't Noise Pollution"], "s": [0, 3, 4]},
{"a": "Metallica", "t": "Master of Puppets", "y": 1986, "g": "Heavy Metal", "d": "Thrash metal's pinnacle \u2014 the moment the genre achieved genuine artistic greatness. The eight-minute title track moves through multiple tempos and moods with a structural complexity that proved metal could be progressive without losing its brutality. Cliff Burton's bass playing is extraordinary throughout. He died in a tour bus accident in Sweden during the supporting tour, aged 24. The album was added to the Library of Congress National Recording Registry.", "tr": ["Battery", "Master of Puppets", "The Thing That Should Not Be", "Welcome Home (Sanitarium)", "Disposable Heroes", "Orion", "Damage Inc."], "s": [0, 1, 3, 5]},
{"a": "Guns N' Roses", "t": "Appetite for Destruction", "y": 1987, "g": "Hard Rock", "d": "A debut that sold 30 million copies. Five guys from the Hollywood strip \u2014 drugs, fights, evictions \u2014 channeled chaos into the most ferocious hard rock album since Led Zeppelin. Slash's iconic 'Sweet Child O' Mine' riff was actually a warm-up exercise; Axl Rose heard it and demanded they build a song around it. 'Welcome to the Jungle' captures raw Hollywood sleaze. Both the last great hair metal album and the first great post-hair metal album.", "tr": ["Welcome to the Jungle", "It's So Easy", "Nightrain", "Mr. Brownstone", "Paradise City", "Sweet Child O' Mine", "You're Crazy", "Rocket Queen"], "s": [0, 4, 5, 7]},
{"a": "Pet Shop Boys", "t": "Actually", "y": 1987, "g": "Synth Pop", "d": "'It's a Sin' \u2014 Catholic guilt as synth anthem. Intelligent, witty, deeply melodic. High point of 80s synth-pop.", "tr": ["One More Chance", "What Have I Done to Deserve This?", "Shopping", "Rent", "It's a Sin", "I Want to Wake Up", "Heart", "King's Cross"], "s": [1, 4, 6]},
{"a": "Depeche Mode", "t": "Violator", "y": 1990, "g": "Synth Pop", "d": "Synth-pop gone dark, atmospheric, and sensual. 'Personal Jesus' \u2014 inspired by Priscilla Presley's memoir \u2014 and 'Enjoy the Silence' are among the era's greatest singles, massive hits that brought Depeche Mode to stadium-level popularity in America. Martin Gore's songwriting reached its peak, balancing electronic precision with genuine emotional vulnerability. Recorded across studios in Milan, London, and Denmark. Its influence on industrial, electronic, and indie music continues.", "tr": ["World in My Eyes", "Sweetest Perfection", "Personal Jesus", "Halo", "Waiting for the Night", "Enjoy the Silence", "Policy of Truth", "Blue Dress", "Clean"], "s": [2, 5, 6]},
{"a": "Cocteau Twins", "t": "Heaven or Las Vegas", "y": 1990, "g": "Dream Pop", "d": "Elizabeth Fraser sang in what appeared to be a self-invented glossolalia \u2014 not quite English, not quite anything, but somehow conveying profound emotion. Robin Guthrie's layered guitar effects created shimmering walls of sound. Fraser was pregnant during recording, which may account for the unusual warmth. They never achieved mass commercial success, hating interviews and touring, remaining a secret among people who value beauty and mystery above all else in their music.", "tr": ["Cherry-Coloured Funk", "Pitch the Baby", "Iceblink Luck", "Fifty-Fifty Clown", "Heaven or Las Vegas", "I Wear Your Ring", "Fotzepolitic", "Frou-Frou Foxes in Midsummer Fires"], "s": [0, 2, 4, 7]},
{"a": "The Cure", "t": "Disintegration", "y": 1989, "g": "Gothic Rock", "d": "Robert Smith, turning thirty and in existential crisis, consuming hallucinogens and watching rain for weeks. Keyboardist Lol Tolhurst was fired during sessions for his alcoholism. The label rejected the album as 'too slow and too long.' It became their most commercially successful record and is now considered their masterpiece. 'Lovesong' was a wedding present for Smith's childhood sweetheart, Mary. 'Plainsong' opens with one of the most majestic introductions in all of rock.", "tr": ["Plainsong", "Pictures of You", "Closedown", "Lovesong", "Last Dance", "Lullaby", "Fascination Street", "Prayers for Rain", "Disintegration"], "s": [0, 1, 3, 5]},
{"a": "Pixies", "t": "Doolittle", "y": 1989, "g": "Alternative Rock", "d": "Kurt Cobain openly admitted that Nevermind was essentially his attempt to write a Pixies album. Their loud-quiet-loud dynamics, Black Francis's surrealist screaming, and Kim Deal's unforgettable basslines defined the alternative rock template. Producer Gil Norton balanced their noise with pop accessibility. 'Debaser' references the Bu\u00f1uel film Un Chien Andalou. 'Here Comes Your Man' is a perfect pop song hiding inside a noise-rock album. The blueprint for 1990s alternative.", "tr": ["Debaser", "Tame", "Wave of Mutilation", "I Bleed", "Here Comes Your Man", "Dead", "Monkey Gone to Heaven", "Mr. Grieves", "La La Love You", "Hey", "Gouge Away"], "s": [0, 4, 6, 10]},
{"a": "Sonic Youth", "t": "Daydream Nation", "y": 1988, "g": "Alternative Rock", "d": "A double album representing Sonic Youth's transition from underground noise-art to the band that would sign to a major label and bring Nirvana with them. Thurston Moore and Lee Ranaldo's alternate tunings \u2014 every song requires different tuning \u2014 create dissonant harmonics that shimmer between beauty and aggression. 'Teen Age Riot' is a seven-minute anthem. 'The Sprawl' was inspired by William Gibson. In 2005, the Library of Congress added it to the National Recording Registry.", "tr": ["Teen Age Riot", "Silver Rocket", "The Sprawl", "Cross the Breeze", "Eric's Trip", "Total Trash", "Hey Joni", "Providence", "Candle", "Trilogy"], "s": [0, 2, 5]},
{"a": "Bad Brains", "t": "Bad Brains", "y": 1982, "g": "Punk Rock", "d": "Four Black men from Washington D.C. playing the fastest, most ferocious hardcore punk anyone had ever heard \u2014 then switching to reggae mid-set without breaking a sweat. H.R.'s vocals and Dr. Know's guitar were superhuman. 'Pay to Cum' is 90 seconds of pure velocity. 'Sailin' On' invented positive hardcore. They bridged punk and reggae in a way nobody had attempted, and their influence on both hardcore and alternative music is profound.", "tr": ["Sailin On", "Don't Need It", "Attitude", "Banned in D.C.", "Jah Calling", "Leaving Babylon", "Pay to Cum", "Right Brigade", "I Luv I Jah"], "s": [0, 3, 6, 7]},

{"a": "Nirvana", "t": "Nevermind", "y": 1991, "g": "Grunge", "d": "Six weeks at Sound City Studios in Van Nuys, $65,000 budget. Geffen Records expected to sell 250,000 copies \u2014 it sold 30 million. 'Smells Like Teen Spirit' knocked Michael Jackson's Dangerous off the number one spot in January 1992, marking the symbolic end of 1980s pop excess and the beginning of alternative rock's mainstream dominance. Cobain later expressed regret about Butch Vig's polished production, wishing for a rawer sound. The underwater baby on the cover cost $200 to photograph.", "tr": ["Smells Like Teen Spirit", "In Bloom", "Come as You Are", "Breed", "Lithium", "Polly", "Territorial Pissings", "Drain You", "Lounge Act", "Something in the Way"], "s": [0, 2, 4, 7]},
{"a": "Radiohead", "t": "OK Computer", "y": 1997, "g": "Alternative Rock", "d": "Recorded largely at a 15th-century mansion in Bath, St Catherine's Court, Thom Yorke channeled the anxiety of the approaching millennium into songs about motorway crashes, surveillance, and digital alienation \u2014 predicting smartphone-era disconnection before smartphones existed. Produced by Nigel Godrich, who became their permanent collaborator. 'Paranoid Android' was six minutes of prog-rock in the Britpop era. Debuted at number one in the UK and has been voted the greatest album of all time in multiple international polls.", "tr": ["Airbag", "Paranoid Android", "Subterranean Homesick Alien", "Exit Music", "Let Down", "Karma Police", "Fitter Happier", "Electioneering", "Climbing Up the Walls", "No Surprises", "Lucky", "The Tourist"], "s": [1, 3, 4, 5]},
{"a": "Radiohead", "t": "Kid A", "y": 2000, "g": "Experimental Rock", "d": "After OK Computer's critical and commercial success, Yorke had a creative breakdown \u2014 couldn't write, couldn't sleep. Eighteen months of studio sessions emerged with glitchy electronics replacing guitars, Yorke's lyrics cut up and reassembled. The band fought constantly. Released with no singles and zero promotion in an era when that was commercial suicide. 'How to Disappear Completely' is devastatingly beautiful. 'Idioteque' samples a 1973 computer music composition. Number one in twelve countries. Rock's most important creative pivot.", "tr": ["Everything in Its Right Place", "Kid A", "The National Anthem", "How to Disappear Completely", "Treefingers", "Optimistic", "In Limbo", "Idioteque", "Morning Bell", "Motion Picture Soundtrack"], "s": [0, 3, 5, 7]},
{"a": "Radiohead", "t": "In Rainbows", "y": 2007, "g": "Alternative Rock", "d": "Released as a pay-what-you-want download \u2014 revolutionary in 2007, it made global headlines and changed how musicians thought about distribution. The most emotionally warm Radiohead album, recorded over two years at their Oxfordshire studio. 'Nude,' shelved since the OK Computer era, finally found its form. 'Reckoner' is among their most gorgeous songs. 'Weird Fishes/Arpeggi' layers interlocking guitar patterns into something oceanic. Proof that the band could be experimental and accessible simultaneously.", "tr": ["15 Step", "Bodysnatchers", "Nude", "Weird Fishes/Arpeggi", "All I Need", "Faust Arp", "Reckoner", "House of Cards", "Jigsaw Falling into Place", "Videotape"], "s": [2, 3, 6]},
{"a": "Portishead", "t": "Dummy", "y": 1994, "g": "Trip Hop", "d": "Geoff Barrow, Beth Gibbons, and Adrian Utley essentially created trip hop by accident. Barrow constructed beats from scratched vinyl and samples from spy-film soundtracks by Lalo Schifrin and John Barry. Gibbons's vocal \u2014 damaged, beautiful, seemingly on the verge of collapse \u2014 floats above the darkness. Won the Mercury Prize. Its noir atmosphere spawned a thousand imitators but has never been matched. Still sounds like three in the morning in a city you've never visited, and it always will.", "tr": ["Mysterons", "Sour Times", "Strangers", "It Could Be Sweet", "Wandering Star", "It's a Fire", "Numb", "Roads", "Pedestal", "Glory Box"], "s": [1, 4, 7, 9]},
{"a": "Massive Attack", "t": "Mezzanine", "y": 1998, "g": "Trip Hop", "d": "The darkest and most claustrophobic of Massive Attack's albums, recorded during severe internal tensions that nearly destroyed the group. 'Teardrop' features Elizabeth Fraser of the Cocteau Twins singing over a sample of a heartbeat \u2014 it later became the theme to House M.D., ensuring millions heard it weekly. 'Angel' is seven minutes of creeping dread that builds to a crushing climax. The album sold over four million copies and proved that experimental electronic music could reach a mass audience.", "tr": ["Angel", "Risingson", "Teardrop", "Inertia Creeps", "Exchange", "Dissolved Girl", "Man Next Door", "Black Milk", "Mezzanine", "Group Four"], "s": [0, 2, 3]},
{"a": "Lauryn Hill", "t": "The Miseducation of Lauryn Hill", "y": 1998, "g": "R&B / Hip Hop", "d": "Recorded while pregnant with her second child, themes of motherhood, spirituality, and Black identity permeate every track. Classroom interludes frame the album as a lesson in love. Debuted at number one with 422,000 first-week sales. Won five Grammys including Album of the Year \u2014 the first hip hop album to do so and the first time a woman won five in one night. She largely retreated from recording afterward, making this album feel even more like a singular, unrepeatable event.", "tr": ["Lost Ones", "Ex-Factor", "To Zion", "Doo Wop (That Thing)", "Superstar", "Final Hour", "When It Hurts So Bad", "Everything Is Everything"], "s": [1, 3, 6, 7]},
{"a": "OutKast", "t": "Aquemini", "y": 1998, "g": "Hip Hop", "d": "The title merges Andr\u00e9 3000's zodiac sign (Aquarius) with Big Boi's (Gemini). George Clinton appears. 'SpottieOttieDopaliscious' is an eight-minute spoken-word narrative about young love over one of the most gorgeous horn arrangements in hip hop history. 'Rosa Parks' led to a lawsuit that wasn't settled until 2005. The album proved that Atlanta could produce hip hop as artistically ambitious and lyrically complex as anything from either coast.", "tr": ["Return of the G", "Rosa Parks", "Skew It on the Bar-B", "Aquemini", "Synthesizer", "Da Art of Storytellin Pt 1", "SpottieOttieDopaliscious", "Liberation", "Chonkyfire"], "s": [1, 3, 5, 6]},
{"a": "Nas", "t": "Illmatic", "y": 1994, "g": "Hip Hop", "d": "A twenty-year-old from the Queensbridge housing projects in Long Island City. Production by DJ Premier, Pete Rock, Q-Tip, and Large Professor \u2014 each bringing a different sonic texture. 'N.Y. State of Mind' was recorded in a single take \u2014 Nas freestyled hearing the beat for the first time, and what he delivered was so perfect nobody could believe it. Thirty-nine minutes, ten tracks, a lyrical density and observational precision that has never been surpassed in hip hop.", "tr": ["The Genesis", "N.Y. State of Mind", "Life's a Bitch", "The World Is Yours", "Halftime", "Memory Lane", "One Love", "Represent", "It Ain't Hard to Tell"], "s": [1, 2, 3, 6]},
{"a": "Wu-Tang Clan", "t": "Enter the Wu-Tang (36 Chambers)", "y": 1993, "g": "Hip Hop", "d": "RZA conceived a five-year plan for hip hop domination. Nine MCs from Staten Island, a basement studio, cheap equipment, and martial arts film samples. The lo-fi aesthetic was born of necessity but became their signature sound \u2014 dusty, aggressive, cinematic. Each member signed solo deals with different labels, creating Wu-Tang as hip hop's first corporation. 'C.R.E.A.M.' and 'Protect Ya Neck' announced a new era. Over two million copies sold.", "tr": ["Bring da Ruckus", "Shame on a Nigga", "Clan in da Front", "Can It Be All So Simple", "Da Mystery of Chessboxin", "C.R.E.A.M.", "Method Man", "Protect Ya Neck", "Tearz"], "s": [0, 4, 5, 6]},
{"a": "The Notorious B.I.G.", "t": "Ready to Die", "y": 1994, "g": "Hip Hop", "d": "Biggie's vivid, cinematic debut \u2014 funny, terrifying, and deeply human, often within the same verse. His flow was so natural and inventive it made complex rhyme schemes sound like casual conversation. 'Juicy' is hip hop's ultimate rags-to-riches anthem, sampling Mtume over a narrative that moves from sharing a room with roaches to sipping champagne. 'Big Poppa' made street rap seductive. Puff Daddy's glossy production proved hip hop could dominate commercially without losing authenticity.", "tr": ["Things Done Changed", "Gimme the Loot", "Machine Gun Funk", "Warning", "Ready to Die", "Juicy", "Everyday Struggle", "Big Poppa", "Unbelievable", "Suicidal Thoughts"], "s": [1, 5, 7, 8]},
{"a": "Dr. Dre", "t": "The Chronic", "y": 1992, "g": "Hip Hop", "d": "After leaving N.W.A, Dre invented G-funk \u2014 Parliament-Funkadelic samples slowed to cruising speed, whiny synthesizer leads, and deep bass, over which a young Snoop Dogg debuted his laconic, melodic drawl. 'Nuthin' but a G Thang' made West Coast rap globally dominant overnight. Death Row Records launched an empire. The production was so influential it changed hip hop's sonic landscape permanently \u2014 suddenly everyone wanted that smooth, sun-drenched California sound.", "tr": ["The Chronic", "Fuck wit Dre Day", "Let Me Ride", "Nuthin' but a G Thang", "Lil' Ghetto Boy", "Rat-Tat-Tat-Tat", "Stranded on Death Row", "Bitches Ain't Shit"], "s": [1, 2, 3]},
{"a": "Public Enemy", "t": "It Takes a Nation of Millions to Hold Us Back", "y": 1988, "g": "Hip Hop", "d": "The Bomb Squad's production \u2014 layers of sirens, James Brown screams, free jazz squeals, and political speeches stacked into the densest sonic collages in hip hop history \u2014 matched Chuck D's booming voice delivering the most politically charged lyrics in popular music. 'Bring the Noise' melds Slayer with funk. Sampled so heavily from so many sources that the album could never be made the same way under current copyright law. Proved that radical art could find a mass audience.", "tr": ["Bring the Noise", "Don't Believe the Hype", "Night of the Living Baseheads", "Black Steel in the Hour of Chaos", "Rebel Without a Pause", "Prophets of Rage", "Party for Your Right to Fight"], "s": [0, 1, 3, 4]},
{"a": "A Tribe Called Quest", "t": "The Low End Theory", "y": 1991, "g": "Hip Hop", "d": "Brought in legendary jazz bassist Ron Carter \u2014 not to sample but to play live, bridging jazz and hip hop in real time. Q-Tip and Phife Dawg trade verses with effortless chemistry, their contrasting styles (Q-Tip smooth and abstract, Phife sharp and streetwise) creating hip hop's greatest partnership. 'Scenario' introduced a young Busta Rhymes to the world. The album married jazz and hip hop permanently, creating an entire subgenre and influencing countless artists.", "tr": ["Excursions", "Buggin' Out", "Rap Promoter", "Verses from the Abstract", "Check the Rhime", "Jazz (We've Got)", "Scenario"], "s": [0, 1, 4, 6]},

{"a": "Jeff Buckley", "t": "Grace", "y": 1994, "g": "Alternative Rock", "d": "Buckley's only completed studio album before he drowned in the Mississippi River in 1997 at age thirty. His four-octave voice \u2014 capable of intimate whispers and soaring power within a single phrase \u2014 transforms covers of Leonard Cohen and Benjamin Britten into deeply personal statements. His version of 'Hallelujah' became so definitive it's now the standard by which all others are judged. A debut that was simultaneously a farewell \u2014 everything he would have become is suggested in these ten tracks.", "tr": ["Mojo Pin", "Grace", "Last Goodbye", "Lilac Wine", "So Real", "Hallelujah", "Lover You Should've Come Over", "Eternal Life", "Dream Brother"], "s": [1, 2, 5, 6]},
{"a": "Bjork", "t": "Homogenic", "y": 1997, "g": "Art Pop", "d": "After a stalker fan mailed a letter bomb (intercepted by police), Bj\u00f6rk retreated to Iceland and channeled the volcanic landscape into music. Working with Mark Bell of LFO and the Icelandic String Octet, she fused glacial beats with sweeping orchestral arrangements. 'J\u00f3ga' uses gabba-speed drums under strings of heartbreaking beauty. Alexander McQueen designed the warrior costume for the Nick Knight cover photograph. The album where her artistic vision crystallized most purely.", "tr": ["Hunter", "Joga", "Unravel", "Bachelorette", "All Neon Like", "5 Years", "Alarm Call", "Pluto", "All Is Full of Love"], "s": [0, 1, 3, 8]},

{"a": "My Bloody Valentine", "t": "Loveless", "y": 1991, "g": "Shoegaze", "d": "Kevin Shields spent two years and reportedly bankrupted Creation Records pursuing the perfect guitar sound. His technique \u2014 manipulating the tremolo bar while strumming \u2014 created layered walls of blurred noise that are somehow incredibly tender. The final mix sessions alone took months in multiple studios. Bilinda Butcher's vocals float through the distortion like a voice heard through deep water. Nothing before or since has ever sounded like it. The definitive shoegaze album, and one of the most influential recordings of the 1990s.", "tr": ["Only Shallow", "Loomer", "Touched", "To Here Knows When", "When You Sleep", "I Only Said", "Come In Alone", "Sometimes", "Blown a Wish", "Soon"], "s": [0, 3, 4, 7]},
{"a": "Elliott Smith", "t": "Either/Or", "y": 1997, "g": "Indie Rock", "d": "Recorded on a four-track in his Portland basement and at a friend's studio. Smith's whispered, double-tracked vocals and fingerpicked acoustic guitar created intimate folk-pop of devastating emotional precision. 'Between the Bars' is heartbreaking in its simplicity. 'Angeles' builds from gentleness to fury. Several tracks appeared in Good Will Hunting, earning an Oscar nomination and bringing Smith \u2014 in his thrift-store suit \u2014 to perform at the Academy Awards. He died in 2003 at 34 under disputed circumstances.", "tr": ["Speed Trials", "Alameda", "Ballad of Big Nothing", "Between the Bars", "Pictures of Me", "No Name No. 5", "Rose Parade", "Angeles", "Cupid's Trick", "2:45 AM", "Say Yes"], "s": [0, 3, 7, 10]},

{"a": "Neutral Milk Hotel", "t": "In the Aeroplane Over the Sea", "y": 1998, "g": "Indie Rock", "d": "Jeff Mangum's raw-throated folk-punk songs about Anne Frank, two-headed boys, semen, and resurrection were recorded in a Denver studio with singing saws, zanzithophone, and uilleann pipes. The album was a slow burn commercially, but became the internet age's most beloved cult album \u2014 the one every music forum eventually recommends. Mangum, overwhelmed, retreated from public life for over a decade. Its fervent following borders on religious devotion.", "tr": ["The King of Carrot Flowers Pt. One", "The King of Carrot Flowers Pts. Two & Three", "In the Aeroplane Over the Sea", "Two-Headed Boy", "Holland 1945", "Communist Daughter", "Oh Comely", "Ghost", "Two-Headed Boy Pt. Two"], "s": [0, 2, 4, 6]},
{"a": "R.E.M.", "t": "Automatic for the People", "y": 1992, "g": "Alternative Rock", "d": "String arrangements by Led Zeppelin's John Paul Jones add orchestral grandeur to the band's most somber and beautiful album. 'Everybody Hurts' became a genuine lifeline for people experiencing depression \u2014 simple, sincere, and profoundly needed. 'Nightswimming' is one of the great piano ballads about nostalgia. 'Man on the Moon' honors Andy Kaufman. Michael Stipe's lyrics address mortality, loss, and the passage of time with unprecedented grace. Over eighteen million copies worldwide.", "tr": ["Drive", "Try Not to Breathe", "Everybody Hurts", "Sweetness Follows", "Monty Got a Raw Deal", "Ignoreland", "Man on the Moon", "Nightswimming", "Find the River"], "s": [2, 4, 7]},

{"a": "Daft Punk", "t": "Discovery", "y": 2001, "g": "Electronic", "d": "French disco and funk filtered through vocoders and house music production. Thomas Bangalter and Guy-Manuel de Homem-Christo conceived the album alongside Leiji Matsumoto's anime film Interstella 5555. 'One More Time' samples Eddie Johns. 'Digital Love' samples George Duke. 'Harder, Better, Faster, Stronger' was later sampled by Kanye West. Over three million copies sold and incalculable influence on pop, indie, and electronic music for two decades.", "tr": ["One More Time", "Aerodynamic", "Digital Love", "Harder Better Faster Stronger", "Crescendolls", "Superheroes", "Something About Us", "Voyager", "Veridis Quo", "Face to Face", "Too Long"], "s": [0, 2, 3, 6]},
{"a": "Kanye West", "t": "The College Dropout", "y": 2004, "g": "Hip Hop", "d": "After being dismissed as 'just a producer,' West's debut proved he could rap brilliantly. Sped-up soul samples became his signature \u2014 'Through the Wire' was recorded with his jaw literally wired shut after a car accident, and you can hear it in every syllable. 'Jesus Walks' tackled faith in mainstream rap with a gospel choir. West's themes \u2014 education, class, consumerism \u2014 were personal and political simultaneously. Went quadruple platinum and launched the most influential career in 21st-century music.", "tr": ["We Don't Care", "All Falls Down", "Spaceship", "Jesus Walks", "Never Let Me Down", "Slow Jamz", "School Spirit", "Two Words", "Through the Wire", "Family Business", "Last Call"], "s": [1, 3, 8]},
{"a": "Kanye West", "t": "My Beautiful Dark Twisted Fantasy", "y": 2010, "g": "Hip Hop", "d": "After the Taylor Swift VMA incident, West self-exiled to a Hawaiian studio and assembled Kid Cudi, Nicki Minaj, Bon Iver, Rick Ross, Pusha T, and dozens more into hip hop's most ambitious recording. 'Power' samples twelve sources including King Crimson. 'Runaway' builds from a single piano note into a nine-minute epic that ends with Auto-Tuned vocals intentionally degraded into pure texture. George Condo's cover was banned by retailers. Hip hop's maximalist opus \u2014 grandiose, flawed, and absolutely essential.", "tr": ["Dark Fantasy", "Gorgeous", "POWER", "All of the Lights", "Monster", "So Appalled", "Devil in a New Dress", "Runaway", "Blame Game", "Lost in the World"], "s": [2, 3, 6, 7]},
{"a": "Kanye West", "t": "808s & Heartbreak", "y": 2008, "g": "Hip Hop", "d": "After his mother died from cosmetic surgery complications and his engagement to Alexis Phifer ended, West abandoned rap for stark, Auto-Tuned singing over Roland TR-808 drum machine beats. Universally panned on release \u2014 now recognized as the album that invented modern hip hop's emotional register. Without 808s there's no Drake, no Kid Cudi, no Travis Scott, no Juice WRLD. A commercial risk born of genuine grief that changed popular music's direction.", "tr": ["Say You Will", "Welcome to Heartbreak", "Heartless", "Amazing", "Love Lockdown", "Paranoid", "RoboCop", "Street Lights", "Coldest Winter"], "s": [1, 2, 4, 7]},
{"a": "Madvillain", "t": "Madvillainy", "y": 2004, "g": "Hip Hop", "d": "MF DOOM \u2014 the masked rapper named after Marvel's Doctor Doom \u2014 and producer Madlib created underground hip hop's defining statement. Most of the 22 tracks are under two minutes: dense, offbeat, and endlessly rewarding on repeat listens. DOOM's labyrinthine wordplay, with its internal rhymes and misdirections, reveals new meanings with every listen. Madlib drew from the most obscure corners of jazz and film soundtracks. The album that serious rap fans recommend first. DOOM died in 2020.", "tr": ["The Illest Villains", "Accordion", "Meat Grinder", "Bistro", "Raid", "America's Most Blunted", "Money Folder", "Figaro", "Fancy Clown", "All Caps", "Great Day"], "s": [1, 2, 7, 9]},
{"a": "Arcade Fire", "t": "Funeral", "y": 2004, "g": "Indie Rock", "d": "Named for the deaths of multiple band members' relatives during the recording period. The Montreal collective channeled genuine grief into euphoric anthems of startling power \u2014 'Wake Up' became a stadium singalong, 'Rebellion (Lies)' a generation's anthem. David Bowie, David Byrne, and U2 championed them publicly. Recorded in a church and a small loft on tiny Merge Records, it proved that sincerity and ambition could be revolutionary forces in indie rock.", "tr": ["Neighborhood #1 (Tunnels)", "Neighborhood #2 (Laika)", "Une Annee Sans Lumiere", "Neighborhood #3 (Power Out)", "Crown of Love", "Wake Up", "Haiti", "Rebellion (Lies)", "In the Backseat"], "s": [0, 3, 5, 7]},

{"a": "Frank Ocean", "t": "Blonde", "y": 2016, "g": "R&B", "d": "Ocean fulfilled his Def Jam contract with the visual album Endless, then independently released Blonde the very next day \u2014 an extraordinary power play. Contributions from Pharrell, Radiohead's Jonny Greenwood, James Blake, and Beyonc\u00e9 appear in fragments. The beat switch in 'Nights' became one of modern music's most analyzed moments. 'Self Control' is devastating. Debuted at number one with zero singles, no interviews, no radio play \u2014 just the music and its reputation.", "tr": ["Nikes", "Ivy", "Pink + White", "Solo", "Skyline To", "Self Control", "Nights", "Solo (Reprise)", "White Ferrari", "Seigfried", "Godspeed", "Futura Free"], "s": [1, 2, 5, 6]},
{"a": "Kendrick Lamar", "t": "good kid m.A.A.d city", "y": 2012, "g": "Hip Hop", "d": "A Compton coming-of-age story structured as a concept album, with skits framed as voicemails from Kendrick's concerned parents. Dr. Dre executive-produced. 'Backseat Freestyle' and 'Swimming Pools' became anthems, but 'm.A.A.d city' told a harrowing story of violence and survival. 'Sing About Me, I'm Dying of Thirst' is twelve minutes of the most ambitious storytelling in hip hop. Debuted at number two and has been certified triple platinum.", "tr": ["Sherane", "Bitch Don't Kill My Vibe", "Backseat Freestyle", "The Art of Peer Pressure", "Money Trees", "Poetic Justice", "good kid", "m.A.A.d city", "Swimming Pools", "Sing About Me", "Compton"], "s": [2, 4, 8, 9]},
{"a": "Kendrick Lamar", "t": "To Pimp a Butterfly", "y": 2015, "g": "Hip Hop", "d": "Two years in the making with Thundercat, Kamasi Washington, and Terrace Martin providing a live jazz-funk foundation. A spoken-word poem weaves through all sixteen tracks, revealed on the finale as an imagined conversation with Tupac Shakur. 'Alright' became the anthem of the Black Lives Matter movement. Kendrick later won the Pulitzer Prize for Music \u2014 the first non-classical, non-jazz artist to receive the honor. A landmark of 21st-century American art.", "tr": ["Wesley's Theory", "For Free?", "King Kunta", "These Walls", "u", "Alright", "Momma", "Hood Politics", "How Much a Dollar Cost", "The Blacker the Berry", "i", "Mortal Man"], "s": [2, 5, 8, 9]},

{"a": "Grouper", "t": "Ruins", "y": 2014, "g": "Ambient / Folk", "d": "Liz Harris spent a month alone in a crumbling house in Aljezur, Portugal, recording with a piano and a four-track. Frogs croak outside. The boundary between music and environment dissolves completely. Songs emerge from and recede into silence. 'Clearing' is four minutes of piano chords and whispered vocals that contain more emotional truth than most double albums. Devastatingly intimate \u2014 the sonic equivalent of reading someone's private journal.", "tr": ["Made of Metal", "Clearing", "Call Across Rooms", "Labyrinth", "Lighthouse", "Holding", "Made of Air"], "s": [0, 2, 3]},
{"a": "Vashti Bunyan", "t": "Just Another Diamond Day", "y": 1970, "g": "Psychedelic Folk", "d": "Bunyan traveled to Scotland by horse-drawn wagon to join a commune, singing delicately beautiful pastoral folk songs along the way. Joe Boyd produced. It sold zero copies and she abandoned music entirely for thirty years. When the album was rediscovered by the internet generation, original pressings were selling for thousands. She returned to music in 2005. A lost masterpiece of the gentlest, most fragile beauty.", "tr": ["Diamond Day", "Glow Worms", "Lily Pond", "Timothy Grub", "Swallow Song", "Rose Hip November", "Come Wind Come Rain", "Rainbow River"], "s": [0, 1, 5, 7]},
{"a": "Young Marble Giants", "t": "Colossal Youth", "y": 1980, "g": "Minimal Post-Punk", "d": "Recorded in four days for 600 pounds. Alison Statton's whispered vocals over a cheap Casio organ, Stuart Moxham's clean guitar, and barely-there bass \u2014 no drums on most tracks. Where punk and post-punk added layers of noise, they stripped everything away. One perfect album, then they vanished. Kurt Cobain was a fan. The blueprint for minimal indie pop, twee, and everything quiet and devastating.", "tr": ["Searching for Mr Right", "Eating Noddemix", "Colossal Youth", "Wind in the Rigging", "Choci Loni", "Salad Days", "Credit in the Straight World", "Include Me Out", "Brand-New-Life", "Final Day"], "s": [2, 6, 9]},

{"a": "Moondog", "t": "Moondog", "y": 1969, "g": "Minimalist / Classical Outsider", "d": "Louis Thomas Hardin \u2014 a blind street musician who stood on Sixth Avenue in Manhattan wearing a Viking helmet and homemade robes. He invented his own instruments and composed counterpoint that predated minimalism by a decade. Charlie Parker used to jam with him. This Columbia Records album brought his music to a wider audience: intricate canons, street percussion, and a visionary musical mind operating entirely outside every establishment.", "tr": ["Theme", "Minisym", "Stamping Ground", "Birds", "Lament I Bird's Lament", "Pigmy Pig", "Organ Round", "Wind River Lullaby"], "s": [2, 4, 6]},

{"a": "This Heat", "t": "Deceit", "y": 1981, "g": "Post-Punk / Avant-Garde", "d": "Recorded in a converted cold storage room in Brixton using tape loops, found sounds, and a growing paranoia about nuclear annihilation and media manipulation. 'S.P.Q.R.' deconstructs a history of empires over industrial clatter. The album predicted industrial music, post-rock, and sample-based composition by years. Charles Bullen, Charles Hayward, and Gareth Williams created something that still sounds like the future \u2014 anxious, brilliant, and utterly uncompromising.", "tr": ["Sleep", "Paper Hats", "Triumph", "S.P.Q.R.", "Cenotaph", "Shrinkwrap", "Radio Prague", "Independence", "A New Kind of Water"], "s": [0, 3, 4, 8]},
